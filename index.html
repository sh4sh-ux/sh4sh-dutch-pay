<!doctype html>
<!-- Dutch Pay v9 tap zoom fix -->
<!-- Dutch Pay v7 exact report box match -->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#24c5b6" />
  <meta name="color-scheme" content="light" />
  <meta name="description" content="모임 금액을 빠르게 나누고 정산 내역을 공유하는 더치페이 계산기" />

  <title>더치페이 계산기</title>

  <link rel="manifest" href="./manifest.webmanifest?v=9" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="더치페이" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <style>
    :root {
      --bg: #f3fbfa;
      --card: rgba(255, 255, 255, 0.92);
      --card-strong: #ffffff;
      --text: #172026;
      --muted: #72808c;
      --line: #dceeed;
      --primary: #22bfb2;
      --primary-strong: #109a96;
      --primary-soft: #dbf8f5;
      --accent: #ffd66b;
      --danger: #ef5f5f;
      --shadow: 0 18px 44px rgba(16, 103, 112, 0.12);
      --radius: 26px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { min-height: 100%; background: var(--bg); }
    body {
      min-height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 0%, rgba(34, 191, 178, 0.22), transparent 38%),
        radial-gradient(circle at 92% 7%, rgba(54, 94, 234, 0.16), transparent 34%),
        linear-gradient(180deg, #f8fffe 0%, var(--bg) 52%, #eff9f7 100%);
      overscroll-behavior-y: contain;
    }

    button, input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(100%, 520px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: calc(18px + var(--safe-top)) 16px calc(24px + var(--safe-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 4px 2px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .app-icon {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #25c7b8, #3862e8);
      color: #fff;
      box-shadow: 0 12px 28px rgba(31, 145, 157, .26);
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .app-icon::before {
      content: "";
      position: absolute;
      width: 54px;
      height: 54px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .22);
      top: -22px;
      left: -18px;
    }

    .app-icon span {
      position: relative;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: -0.05em;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .ghost-btn {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.7);
      color: #1b5561;
      font-size: 13px;
      font-weight: 800;
      border: 1px solid rgba(205, 231, 230, .9);
      box-shadow: 0 8px 20px rgba(44, 95, 103, .08);
    }

    .hero {
      padding: 22px;
      border-radius: 32px;
      background:
        linear-gradient(140deg, rgba(255,255,255,.96), rgba(255,255,255,.78)),
        radial-gradient(circle at 88% 18%, rgba(255,214,107,.4), transparent 30%);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "₩ ÷";
      position: absolute;
      right: -6px;
      top: -18px;
      color: rgba(34, 191, 178, .08);
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -0.13em;
      pointer-events: none;
    }

    .section-label {
      margin: 0 0 8px;
      color: var(--primary-strong);
      font-size: 13px;
      font-weight: 900;
    }

    .hero-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: -0.07em;
    }

    .hero-copy {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
      font-weight: 650;
    }

    .card {
      margin-top: 14px;
      padding: 18px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid rgba(255,255,255,.86);
      box-shadow: 0 14px 36px rgba(23, 77, 83, .08);
      backdrop-filter: blur(20px);
    }

    .input-grid {
      display: grid;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #536673;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .amount-box {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 22px;
      background: var(--card-strong);
      border: 1px solid var(--line);
    }

    .currency {
      color: var(--primary-strong);
      font-size: 22px;
      font-weight: 950;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    input::placeholder { color: #b6c3ca; }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chip {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-strong);
      font-weight: 900;
      font-size: 13px;
      white-space: nowrap;
    }

    .people-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .person {
      display: grid;
      grid-template-columns: 1fr 128px 40px;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border-radius: 22px;
      background: #fff;
      border: 1px solid var(--line);
    }

    .person input {
      font-size: 16px;
      font-weight: 850;
      padding: 8px;
    }

    .person input.paid {
      text-align: right;
      font-size: 16px;
      font-weight: 900;
    }

    .remove-btn {
      width: 40px;
      height: 40px;
      border-radius: 15px;
      background: #fff0f0;
      color: var(--danger);
      font-size: 20px;
      font-weight: 900;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .primary-btn, .secondary-btn {
      min-height: 52px;
      border-radius: 20px;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .primary-btn {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #3672e8);
      box-shadow: 0 14px 28px rgba(25, 154, 168, .26);
    }

    .secondary-btn {
      color: #1e6972;
      background: #fff;
      border: 1px solid var(--line);
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .stat {
      padding: 15px;
      border-radius: 22px;
      background: #fff;
      border: 1px solid var(--line);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .stat strong {
      display: block;
      font-size: 21px;
      letter-spacing: -0.05em;
    }

    .settlements {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .settlement {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 20px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 14px;
      font-weight: 850;
      line-height: 1.35;
    }

    .settlement b { color: var(--primary-strong); }
    .settlement .money {
      color: #111a20;
      font-weight: 950;
      white-space: nowrap;
    }

    .empty {
      padding: 18px;
      border-radius: 22px;
      background: #fff;
      border: 1px dashed #c6e6e3;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.55;
    }

    .history-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .history-item {
      padding: 13px 14px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: #23313a;
      font-size: 13px;
      font-weight: 850;
    }

    .history-item span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(22px + var(--safe-bottom));
      transform: translate(-50%, 18px);
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(20, 31, 38, .92);
      color: #fff;
      font-weight: 850;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      z-index: 100;
      max-width: min(92vw, 440px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .install-banner {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border-radius: 22px;
      background: #10272d;
      color: #fff;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 14px 28px rgba(7, 42, 50, .18);
    }

    .install-banner.show {
      display: flex;
    }

    .install-banner p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 800;
    }

    .install-banner button {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      color: #08272e;
      background: var(--accent);
      font-weight: 950;
      white-space: nowrap;
    }

    .ios-tip {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 700;
      text-align: center;
    }

    @media (max-width: 380px) {
      .app { padding-inline: 12px; }
      .hero-title { font-size: 25px; }
      .person { grid-template-columns: 1fr 108px 38px; }
      .person input.paid { font-size: 15px; }
      .result-grid { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
    }

    @media (display-mode: standalone) {
      .install-banner, .ios-tip { display: none !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="app-icon" aria-hidden="true"><span>₩÷</span></div>
        <div>
          <h1>더치페이 계산기</h1>
          <div class="subtitle">빠르게 나누고 깔끔하게 정산</div>
        </div>
      </div>
      <button class="ghost-btn" type="button" id="resetBtn">초기화</button>
    </header>

    <section class="hero">
      <p class="section-label">Dutch Pay</p>
      <h2 class="hero-title">총액만 입력하면<br>정산까지 한 번에</h2>
      <p class="hero-copy">인원별 낸 금액을 입력하면 누가 누구에게 얼마를 보내야 하는지 자동으로 계산해요.</p>
    </section>

    <section class="install-banner" id="installBanner">
      <p>휴대전화 홈 화면에 앱처럼 설치할 수 있어요.</p>
      <button type="button" id="installBtn">설치</button>
    </section>
    <div class="ios-tip" id="iosTip">iPhone에서는 Safari 공유 버튼 → “홈 화면에 추가”를 눌러 설치할 수 있어요.</div>

    <section class="card">
      <div class="input-grid">
        <div>
          <label for="totalInput">총 결제 금액</label>
          <div class="amount-box">
            <span class="currency">₩</span>
            <input id="totalInput" inputmode="numeric" autocomplete="off" placeholder="0" />
          </div>
        </div>

        <div>
          <div class="row" style="justify-content: space-between;">
            <label style="margin: 0;">참여 인원 / 낸 금액</label>
            <button class="chip" type="button" id="addPersonBtn">+ 인원 추가</button>
          </div>
          <div class="people-list" id="peopleList"></div>
        </div>
      </div>

      <div class="actions">
        <button class="primary-btn" type="button" id="calcBtn">계산하기</button>
        <button class="secondary-btn" type="button" id="shareBtn">결과 공유</button>
      </div>
    </section>

    <section class="card">
      <div class="row" style="justify-content: space-between;">
        <div>
          <p class="section-label">Result</p>
          <h2 class="hero-title" style="font-size: 22px;">정산 결과</h2>
        </div>
      </div>

      <div class="result-grid">
        <div class="stat">
          <span>1인당 금액</span>
          <strong id="perPerson">₩0</strong>
        </div>
        <div class="stat">
          <span>참여 인원</span>
          <strong id="memberCount">0명</strong>
        </div>
      </div>

      <div class="settlements" id="settlements">
        <div class="empty">총액과 인원을 입력한 뒤 계산하기를 눌러주세요.</div>
      </div>
    </section>

    <section class="card">
      <div class="row" style="justify-content: space-between;">
        <div>
          <p class="section-label">History</p>
          <h2 class="hero-title" style="font-size: 22px;">최근 계산</h2>
        </div>
        <button class="chip" type="button" id="clearHistoryBtn">비우기</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (selector) => document.querySelector(selector);
    const peopleList = $("#peopleList");
    const totalInput = $("#totalInput");
    const perPersonEl = $("#perPerson");
    const memberCountEl = $("#memberCount");
    const settlementsEl = $("#settlements");
    const historyList = $("#historyList");
    const toast = $("#toast");
    const installBanner = $("#installBanner");
    const iosTip = $("#iosTip");

    let deferredPrompt = null;
    let people = [
      { id: crypto.randomUUID(), name: "나", paid: "" },
      { id: crypto.randomUUID(), name: "친구 1", paid: "" },
      { id: crypto.randomUUID(), name: "친구 2", paid: "" }
    ];
    let lastResultText = "";

    const nf = new Intl.NumberFormat("ko-KR");
    const money = (value) => "₩" + nf.format(Math.max(0, Math.round(value || 0)));
    const onlyNumber = (value) => String(value || "").replace(/[^\d]/g, "");
    const parseMoney = (value) => Number(onlyNumber(value)) || 0;

    function formatInput(input) {
      const value = parseMoney(input.value);
      input.value = value ? nf.format(value) : "";
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1700);
    }

    function saveState() {
      localStorage.setItem("dutchpay-state", JSON.stringify({
        total: totalInput.value,
        people
      }));
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem("dutchpay-state") || "null");
        if (saved && Array.isArray(saved.people)) {
          totalInput.value = saved.total || "";
          people = saved.people.map((p) => ({
            id: p.id || crypto.randomUUID(),
            name: p.name || "",
            paid: p.paid || ""
          }));
        }
      } catch (_) {}
    }

    function renderPeople() {
      peopleList.innerHTML = "";
      people.forEach((person) => {
        const row = document.createElement("div");
        row.className = "person";
        row.innerHTML = `
          <input aria-label="이름" value="${escapeHtml(person.name)}" placeholder="이름" data-id="${person.id}" data-field="name" />
          <input class="paid" inputmode="numeric" aria-label="낸 금액" value="${escapeHtml(person.paid)}" placeholder="낸 금액" data-id="${person.id}" data-field="paid" />
          <button class="remove-btn" type="button" aria-label="삭제" data-id="${person.id}">×</button>
        `;
        peopleList.appendChild(row);
      });
      memberCountEl.textContent = `${people.length}명`;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[m]));
    }

    function calculate(options = { save: true }) {
      const total = parseMoney(totalInput.value);
      const activePeople = people
        .map((p, index) => ({
          ...p,
          name: (p.name || `참여자 ${index + 1}`).trim(),
          paidNumber: parseMoney(p.paid)
        }))
        .filter((p) => p.name);

      if (!total || activePeople.length < 2) {
        settlementsEl.innerHTML = `<div class="empty">총액과 2명 이상의 인원을 입력해 주세요.</div>`;
        perPersonEl.textContent = money(0);
        memberCountEl.textContent = `${activePeople.length}명`;
        lastResultText = "";
        return null;
      }

      const count = activePeople.length;
      const exactShare = total / count;
      const perPersonRounded = Math.round(exactShare);
      perPersonEl.textContent = money(perPersonRounded);
      memberCountEl.textContent = `${count}명`;

      const balances = activePeople.map((p) => ({
        name: p.name,
        paid: p.paidNumber,
        balance: Math.round(p.paidNumber - exactShare)
      }));

      let debtors = balances
        .filter((p) => p.balance < 0)
        .map((p) => ({ name: p.name, amount: Math.abs(p.balance) }))
        .sort((a, b) => b.amount - a.amount);

      let creditors = balances
        .filter((p) => p.balance > 0)
        .map((p) => ({ name: p.name, amount: p.balance }))
        .sort((a, b) => b.amount - a.amount);

      const result = [];
      let i = 0, j = 0;
      while (i < debtors.length && j < creditors.length) {
        const amount = Math.min(debtors[i].amount, creditors[j].amount);
        if (amount > 0) {
          result.push({
            from: debtors[i].name,
            to: creditors[j].name,
            amount
          });
        }
        debtors[i].amount -= amount;
        creditors[j].amount -= amount;
        if (debtors[i].amount <= 0) i++;
        if (creditors[j].amount <= 0) j++;
      }

      if (result.length === 0) {
        settlementsEl.innerHTML = `<div class="empty">이미 정확히 나누어 냈어요. 추가 송금이 필요하지 않습니다.</div>`;
      } else {
        settlementsEl.innerHTML = result.map((r) => `
          <div class="settlement">
            <span><b>${escapeHtml(r.from)}</b> → <b>${escapeHtml(r.to)}</b></span>
            <span class="money">${money(r.amount)}</span>
          </div>
        `).join("");
      }

      lastResultText = [
        "더치페이 계산 결과",
        `총액: ${money(total)}`,
        `인원: ${count}명`,
        `1인당: ${money(perPersonRounded)}`,
        "",
        result.length
          ? result.map((r) => `${r.from} → ${r.to}: ${money(r.amount)}`).join("\n")
          : "추가 송금 없음"
      ].join("\n");

      if (options.save) {
        addHistory({ total, count, perPerson: perPersonRounded, resultText: lastResultText });
      }
      return result;
    }

    function getHistory() {
      try { return JSON.parse(localStorage.getItem("dutchpay-history") || "[]"); }
      catch (_) { return []; }
    }

    function setHistory(items) {
      localStorage.setItem("dutchpay-history", JSON.stringify(items.slice(0, 5)));
      renderHistory();
    }

    function addHistory(item) {
      const items = getHistory();
      items.unshift({ ...item, createdAt: new Date().toISOString() });
      setHistory(items);
    }

    function renderHistory() {
      const items = getHistory();
      if (!items.length) {
        historyList.innerHTML = `<div class="empty">최근 계산 내역이 여기에 표시됩니다.</div>`;
        return;
      }

      historyList.innerHTML = items.map((item, index) => {
        const date = new Date(item.createdAt);
        const label = `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
        return `
          <button class="history-item" type="button" data-index="${index}">
            <div>
              ${money(item.total)} · ${item.count}명
              <br><span>1인당 ${money(item.perPerson)} · ${label}</span>
            </div>
            <strong>보기</strong>
          </button>
        `;
      }).join("");
    }

    totalInput.addEventListener("input", () => {
      formatInput(totalInput);
      saveState();
    });

    peopleList.addEventListener("input", (event) => {
      const target = event.target;
      const id = target.dataset.id;
      const field = target.dataset.field;
      const person = people.find((p) => p.id === id);
      if (!person) return;

      if (field === "paid") {
        formatInput(target);
      }
      person[field] = target.value;
      saveState();
    });

    peopleList.addEventListener("click", (event) => {
      const btn = event.target.closest(".remove-btn");
      if (!btn) return;
      if (people.length <= 2) {
        showToast("최소 2명은 필요해요.");
        return;
      }
      people = people.filter((p) => p.id !== btn.dataset.id);
      renderPeople();
      saveState();
      calculate({ save: false });
    });

    $("#addPersonBtn").addEventListener("click", () => {
      people.push({
        id: crypto.randomUUID(),
        name: `친구 ${people.length}`,
        paid: ""
      });
      renderPeople();
      saveState();
      showToast("인원을 추가했어요.");
    });

    $("#calcBtn").addEventListener("click", () => {
      saveState();
      const result = calculate({ save: true });
      if (result) showToast("정산 결과를 계산했어요.");
    });

    $("#shareBtn").addEventListener("click", async () => {
      if (!lastResultText) {
        calculate({ save: false });
      }
      if (!lastResultText) {
        showToast("먼저 계산해 주세요.");
        return;
      }

      try {
        if (navigator.share) {
          await navigator.share({ title: "더치페이 계산 결과", text: lastResultText });
        } else {
          await navigator.clipboard.writeText(lastResultText);
          showToast("결과를 복사했어요.");
        }
      } catch (_) {
        showToast("공유를 취소했어요.");
      }
    });

    $("#resetBtn").addEventListener("click", () => {
      totalInput.value = "";
      people = [
        { id: crypto.randomUUID(), name: "나", paid: "" },
        { id: crypto.randomUUID(), name: "친구 1", paid: "" },
        { id: crypto.randomUUID(), name: "친구 2", paid: "" }
      ];
      lastResultText = "";
      perPersonEl.textContent = money(0);
      memberCountEl.textContent = "3명";
      settlementsEl.innerHTML = `<div class="empty">총액과 인원을 입력한 뒤 계산하기를 눌러주세요.</div>`;
      renderPeople();
      saveState();
      showToast("초기화했어요.");
    });

    $("#clearHistoryBtn").addEventListener("click", () => {
      setHistory([]);
      showToast("최근 계산을 비웠어요.");
    });

    historyList.addEventListener("click", (event) => {
      const item = event.target.closest(".history-item");
      if (!item) return;
      const history = getHistory();
      const selected = history[Number(item.dataset.index)];
      if (!selected) return;
      lastResultText = selected.resultText;
      navigator.clipboard?.writeText(selected.resultText);
      showToast("계산 내역을 복사했어요.");
    });

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBanner.classList.add("show");
    });

    $("#installBtn").addEventListener("click", async () => {
      if (!deferredPrompt) {
        showToast("브라우저 메뉴에서 홈 화면에 추가해 주세요.");
        return;
      }
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBanner.classList.remove("show");
    });

    function detectIOS() {
      return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.matchMedia("(display-mode: standalone)").matches;
    }

    if (!detectIOS()) {
      iosTip.style.display = "none";
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js?v=9").catch(() => {});
      });
    }

    loadState();
    renderPeople();
    renderHistory();
    calculate({ save: false });
  </script>
</body>
</html>
